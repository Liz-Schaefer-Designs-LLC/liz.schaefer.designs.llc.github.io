<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3DBDB5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#heroGrad)" rx="0"/>
  <!-- Decorative overlapping circles -->
  <circle cx="100" cy="100" r="90" fill="#fff" opacity="0.08"/>
  <circle cx="320" cy="320" r="110" fill="#fff" opacity="0.06"/>
  <!-- Monogram -->
  <circle cx="200" cy="185" r="85" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="200" y="165" text-anchor="middle" font-family="Georgia,serif" font-size="56" font-weight="bold" fill="#fff">L</text>
  <text x="200" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="rgba(255,255,255,0.85)" letter-spacing="3">SCHAEFER</text>
  <text x="200" y="235" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="rgba(255,255,255,0.7)" letter-spacing="2">DESIGNS</text>
  <!-- Tagline -->
  <text x="200" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="rgba(255,255,255,0.8)" font-style="italic">Handcrafted with ♥</text>
</svg>
