<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#fff0ee"/>
  <!-- Circular logo design -->
  <circle cx="200" cy="185" r="100" fill="#fff" stroke="#FF6B6B" stroke-width="3" opacity="0.8"/>
  <circle cx="200" cy="185" r="88" fill="none" stroke="#3DBDB5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <!-- Initials -->
  <text x="200" y="175" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#3DBDB5" opacity="0.8">LSD</text>
  <text x="200" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#FF6B6B" opacity="0.8" letter-spacing="3">DESIGNS</text>
  <!-- Stars around circle -->
  <text x="200" y="115" text-anchor="middle" font-family="serif" font-size="16" fill="#FF6B6B" opacity="0.7">✦</text>
  <text x="270" y="150" text-anchor="middle" font-family="serif" font-size="14" fill="#3DBDB5" opacity="0.6">✦</text>
  <text x="130" y="150" text-anchor="middle" font-family="serif" font-size="14" fill="#3DBDB5" opacity="0.6">✦</text>
  <text x="270" y="225" text-anchor="middle" font-family="serif" font-size="12" fill="#FF6B6B" opacity="0.5">✦</text>
  <text x="130" y="225" text-anchor="middle" font-family="serif" font-size="12" fill="#FF6B6B" opacity="0.5">✦</text>
  <text x="200" y="265" text-anchor="middle" font-family="serif" font-size="14" fill="#FF6B6B" opacity="0.6">✦</text>
  <!-- Label below -->
  <rect x="100" y="320" width="200" height="38" rx="8" fill="#FF6B6B" opacity="0.12"/>
  <text x="200" y="345" text-anchor="middle" font-family="Georgia,serif" font-size="17" fill="#FF6B6B" opacity="0.8">Custom Logo Design</text>
</svg>
